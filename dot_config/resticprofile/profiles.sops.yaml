# yaml-language-server: $schema=https://creativeprojects.github.io/resticprofile/jsonschema/config-2.json
version: "2"
global:
    default-command: snapshots
    priority: low
profiles:
    # Base template (not a runnable profile)
    base:
        priority: low
        nice: 19
        ionice:
            class: idle
        lock-wait: 10m
        check-battery: true
        status-file: /home/laenzi/.cache/resticprofile/status.json
        password-command: cat ${CREDENTIALS_DIRECTORY}/restic-pass
        force-inactive-lock: true
        prometheus-push: http://192.168.1.223:8428/api/v1/import/prometheus
        prometheus-push-job: device-backup
        prometheus-labels:
            - device: gibson
        backup:
            extended-status: true
            source:
                - /home/laenzi
                - /etc
                - /boot
                - /root
            tag:
                - resticprofile
            verbose: true
            exclude-file:
                - /home/laenzi/.config/resticprofile/excludes
            exclude-caches: true
            check-before: true
            check-after: true
        retention:
            after-backup: true
            keep-daily: 14
            keep-weekly: 16
            keep-monthly: 18
            keep-yearly: 3
            prune: true
    homeoffice:
        inherit: base
        env:
            DISK_UUID: ENC[AES256_GCM,data:y1S1I2ntHPqdYmCw51rM0gNaxagefZjwmqFWxWi6r2COS4rM,iv:s7eyhiv0MksY0CRb98j3hCRAs2TeiuWEPd7lrOu4uec=,tag:6MKiSJ6yuilyahv1pMPK3w==,type:str]
        repository: ENC[AES256_GCM,data:d5MQYUVZKlQa3XFsSqWKU4e/d9sGKQsyfRhYHQMn1U2C5f1VWRI2rQ==,iv:+PCK10OP/XL59YDyiEruv46OzYtKrIkcS/WZfZh0M0o=,tag:PFP6b8hRz9PNSFK14PAZQQ==,type:str]
        run-before:
            - |
              STATUS_FILE="/home/laenzi/.cache/resticprofile/status.json"
              PROFILE="{{ .Profile.Name }}"
              if [ -f "$STATUS_FILE" ]; then
                LAST_TIME_STR=$(/usr/sbin/jq -r ".profiles.\"$PROFILE\".backup.time // \"1970-01-01T00:00:00Z\"" "$STATUS_FILE")
                LAST_UNIX=$(date -d "$LAST_TIME_STR" +%s)
                THRESHOLD=$(date +%s -d '13 hours ago')
                if [ "$LAST_UNIX" -ge "$THRESHOLD" ]; then
                  echo "Condition: Skipping $PROFILE. Last backup ($LAST_TIME_STR) is too recent."
                  exit 1
                fi
              fi
            - |
              if /sbin/blkid -U ${DISK_UUID} > /dev/null; then
                udisksctl mount -b /dev/disk/by-uuid/${DISK_UUID}
              else
                echo "Disk ${DISK_UUID} not found. Stopping profile {{ .Profile.Name }}."
                exit 1
              fi
            - /home/laenzi/.local/share/chezmoi/dot_config/pacman/run_chezmoi_apply.sh
        run-finally:
            - |
              if /sbin/blkid -U ${DISK_UUID} > /dev/null; then
                # Only unmount if it's actually in the mount list
                if findmnt -rn -S UUID=${DISK_UUID} > /dev/null; then
                  udisksctl unmount -b /dev/disk/by-uuid/${DISK_UUID} --no-user-interaction
                else
                  echo "Disk ${DISK_UUID} is present but was not mounted. No unmount needed."
                fi
              fi
    nas:
        inherit: base
        repository-file: ENC[AES256_GCM,data:R5K0RWQy/MHPBV/sP8z9tWtEJdmVe4oWq29XRV3nZ2Wn,iv:6+QGxH9ICEZEh0595/l/JVs9CCxQ+ZQ2x/s7DMIqIl8=,tag:lON5XEy0YE9InWa0kcMbQw==,type:str]
        run-before:
            - |
              STATUS_FILE="/home/laenzi/.cache/resticprofile/status.json"
              PROFILE="{{ .Profile.Name }}"
              if [ -f "$STATUS_FILE" ]; then
                LAST_TIME_STR=$(/usr/sbin/jq -r ".profiles.\"$PROFILE\".backup.time // \"1970-01-01T00:00:00Z\"" "$STATUS_FILE")
                LAST_UNIX=$(date -d "$LAST_TIME_STR" +%s)
                THRESHOLD=$(date +%s -d '13 hours ago')
                if [ "$LAST_UNIX" -ge "$THRESHOLD" ]; then
                  echo "Condition: Skipping $PROFILE. Last backup ($LAST_TIME_STR) is too recent."
                  exit 1
                fi
              fi
            - |
              if ! ip route get 192.168.1.221 | grep -q "src 192.168.1"; then
                echo "Not on LAN. Skipping profile {{ .Profile.Name }}."
                exit 1
              fi
            - /home/laenzi/.local/share/chezmoi/dot_config/pacman/run_chezmoi_apply.sh
    homeoffice-term:
        inherit: homeoffice
        password-command: secret-tool lookup restic gibson-home
    nas-term:
        inherit: nas
        password-command: secret-tool lookup restic gibson-home
        repository: ENC[AES256_GCM,data:v31sA/4LHxfClqo+AywKiDWOCtUXtis4+QeoTA==,iv:Ea6kGHBq81Njl4DaQ65h5U9eBkFRhTHhYuhCvSIUPFA=,tag:GxKsMqF6AgXyfkAq0v1VIA==,type:str]
        repository-file: ""
groups:
    rotating-backup:
        continue-on-error: true
        profiles:
            - homeoffice
            - nas
        schedules:
            backup:
                at:
                    - "00:00"
                    - "12:00"
                permission: user
                systemd-drop-in-files:
                    - system-integration.conf
