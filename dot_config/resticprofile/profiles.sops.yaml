# yaml-language-server: $schema=https://creativeprojects.github.io/resticprofile/jsonschema/config-2.json
version: "2"
global:
    default-command: snapshots
    priority: low
profiles:
    # Base template (not a runnable profile)
    base:
        priority: low
        nice: 19
        ionice:
            class: idle
        lock-wait: 10m
        check-battery: false
        status-file: /home/laenzi/.cache/resticprofile/status.json
        password-command: cat ${CREDENTIALS_DIRECTORY}/restic-pass
        force-inactive-lock: true
        prometheus-push: http://192.168.1.223:8428/api/v1/import/prometheus
        prometheus-push-job: device-backup
        prometheus-labels:
            - device: gibson
        backup:
            extended-status: true
            source:
                - /home/laenzi
                - /etc
                - /boot
                - /root
            tag:
                - resticprofile
            verbose: true
            exclude-file:
                - /home/laenzi/.config/resticprofile/excludes
            exclude-caches: true
            check-before: true
            check-after: true
        retention:
            after-backup: true
            keep-daily: 14
            keep-weekly: 16
            keep-monthly: 18
            keep-yearly: 3
            prune: true
    homeoffice:
        inherit: base
        check-battery: false
        env:
            DISK_UUID: ENC[AES256_GCM,data:JAJhlH7eohLOO0fCxI7RJq86yO0pN3v/4i14CvnvLHYXP/BQ,iv:XWQhdR3qXllY5qA5a7mOo4f9YaZ0k53hb4Ij8rsJyoc=,tag:4uleDUHKxCKrC4i2XG79Sw==,type:str]
        repository: ENC[AES256_GCM,data:n4QIb4ukLU4kcO4PCdAdESv6tLoDipIxgwd14JFEBY0WR11O0WvVDA==,iv:A5woxqkU+tgo3vUgQWqEPRZGorVklryqREYQSP5bXlU=,tag:OLN0XMYUPHGHKF/HhjF5fw==,type:str]
        run-before:
            - |
              STATUS_FILE="/home/laenzi/.cache/resticprofile/status.json"
              PROFILE="{{ .Profile.Name }}"
              if [ -f "$STATUS_FILE" ]; then
                LAST_SUCCESS=$(/usr/sbin/jq -r ".profiles.\"$PROFILE\".backup.success // \"false\"" "$STATUS_FILE")
                LAST_TIME_STR=$(/usr/sbin/jq -r ".profiles.\"$PROFILE\".backup.time // \"1970-01-01T00:00:00Z\"" "$STATUS_FILE")
                LAST_UNIX=$(date -d "$LAST_TIME_STR" +%s)
                THRESHOLD=$(date +%s -d '13 hours ago')
                if [ "$LAST_SUCCESS" = "true" ] && [ "$LAST_UNIX" -ge "$THRESHOLD" ]; then
                  echo "Condition: Skipping $PROFILE. Last backup ($LAST_TIME_STR) is too recent."
                  exit 1
                fi
              fi
            - |
              if /sbin/blkid -U ${DISK_UUID} > /dev/null; then
                udisksctl mount -b /dev/disk/by-uuid/${DISK_UUID}
              else
                echo "Disk ${DISK_UUID} not found. Stopping profile {{ .Profile.Name }}."
                exit 1
              fi
            - /home/laenzi/.local/share/chezmoi/dot_config/pacman/run_chezmoi_apply.sh
        run-finally:
            - |
              if /sbin/blkid -U ${DISK_UUID} > /dev/null; then
                # Only unmount if it's actually in the mount list
                if findmnt -rn -S UUID=${DISK_UUID} > /dev/null; then
                  udisksctl unmount -b /dev/disk/by-uuid/${DISK_UUID} --no-user-interaction
                else
                  echo "Disk ${DISK_UUID} is present but was not mounted. No unmount needed."
                fi
              fi
    nas:
        inherit: base
        check-battery: false
        repository-file: ENC[AES256_GCM,data:XlTgnEJsndNlg+4EAizAhBTrtnUTJSnvuORl21W3g9/n,iv:FlkF6l4K7H7BAL0hJ5brxOQcWNKkI5Dm+yodgG2gNmo=,tag:sSYL2UabrWsQ2KXw9MMvxA==,type:str]
        run-before:
            - |
              STATUS_FILE="/home/laenzi/.cache/resticprofile/status.json"
              PROFILE="{{ .Profile.Name }}"
              if [ -f "$STATUS_FILE" ]; then
                LAST_SUCCESS=$(/usr/sbin/jq -r ".profiles.\"$PROFILE\".backup.success // \"false\"" "$STATUS_FILE")
                LAST_TIME_STR=$(/usr/sbin/jq -r ".profiles.\"$PROFILE\".backup.time // \"1970-01-01T00:00:00Z\"" "$STATUS_FILE")
                LAST_UNIX=$(date -d "$LAST_TIME_STR" +%s)
                THRESHOLD=$(date +%s -d '13 hours ago')
                if [ "$LAST_SUCCESS" = "true" ] && [ "$LAST_UNIX" -ge "$THRESHOLD" ]; then
                  echo "Condition: Skipping $PROFILE. Last backup ($LAST_TIME_STR) is too recent."
                  exit 1
                fi
              fi
            - |
              if ! ip route get 192.168.1.221 | grep -q "src 192.168.1"; then
                echo "Not on LAN. Skipping profile {{ .Profile.Name }}."
                exit 1
              fi
            - /home/laenzi/.local/share/chezmoi/dot_config/pacman/run_chezmoi_apply.sh
    homeoffice-term:
        inherit: homeoffice
        password-command: secret-tool lookup restic gibson-home
    nas-term:
        inherit: nas
        password-command: secret-tool lookup restic gibson-home
        repository: ENC[AES256_GCM,data:YBepbYWGXfUNwDyOBgRLmwnzCQ+596W4O6vAzw==,iv:I52bTt8E0zaMovIFo3xJLJYadIrG8+xNHfIH58c5LTM=,tag:K7uzdCVHIZRNHJLGeqYOew==,type:str]
        repository-file: ""
groups:
    rotating-backup:
        continue-on-error: true
        profiles:
            - homeoffice
            - nas
        schedules:
            backup:
                at:
                    - "00:00"
                    - "12:00"
                permission: user
                systemd-drop-in-files:
                    - system-integration.conf
sops:
    encrypted_regex: ^(DISK_UUID|repository|repository-file)$
    lastmodified: "2026-06-20T11:16:34Z"
