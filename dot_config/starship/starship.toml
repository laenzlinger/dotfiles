"$schema" = 'https://starship.rs/config-schema.json'

add_newline = false

format = """
$username\
$hostname\
$directory\
$git_branch\
$git_status\
$kubernetes\
$docker_context\
$python\
$nodejs\
$rust\
$golang\
$java\
$c\
$cpp\
$nix_shell\
$terraform\
$aws\
$gcloud\
$container\
$fill\
$cmd_duration\
$status\
$line_break\
$character"""

right_format = ""

[kubernetes]
disabled = false
format = 'in [$symbol$context( \($namespace\))]($style) '
symbol = "Ôİ© "
detect_env_vars = ['KUBECONFIG', 'KUBERNETES_SHOW']
contexts = [
  { context_pattern = ".*dev.*", style = "bold green" },
  { context_pattern = ".*test.*", style = "bold cyan" },
  { context_pattern = ".*(prod|production).*", style = "bold red" },
]

[character]
# Success symbol in standard green, error in standard red
#
success_symbol = "[´äà](bold green)"
error_symbol = "[´äà](bold red)"




[status]
disabled = false
format = "[$symbol$status]($style) "
symbol = "Ô£ù "
style = "bold red"

[profiles]
transient = """$character"""

[git_status]
ahead = "Ôçí${count}"
diverged = "ÔçòÔçí${ahead_count}Ôçú${behind_count}"
behind = "Ôçú${count}"
staged = "+"
